name: BackorderSupplyWait
options:
  bundleIdPrefix: com.shimondeitel.backorder
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  BackorderSupplyWait:
    type: application
    platform: iOS
    sources:
      - path: BackorderSupplyWait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.backorder
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BackorderSupplyWait/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BackorderSupplyWaitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BackorderSupplyWaitTests
    dependencies:
      - target: BackorderSupplyWait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.backorder.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BackorderSupplyWaitUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BackorderSupplyWaitUITests
    dependencies:
      - target: BackorderSupplyWait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.backorder.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  BackorderSupplyWait:
    build:
      targets:
        BackorderSupplyWait: all
        BackorderSupplyWaitTests: [test]
        BackorderSupplyWaitUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: BackorderSupplyWait.storekit
    test:
      config: Debug
      storeKitConfiguration: BackorderSupplyWait.storekit
      targets:
        - BackorderSupplyWaitTests
        - BackorderSupplyWaitUITests
    archive:
      config: Release
